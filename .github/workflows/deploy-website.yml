name: Deploy Website to NAS

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -v \
            ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} echo "SSH OK" 2>&1 | head -50

      - name: Deploy website files
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -r \
            website/index.html website/privacy.html website/contact.html \
            ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:/volume1/Websites/simplepitchcounter.com/

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} \
            "ls -la /volume1/Websites/simplepitchcounter.com/"
