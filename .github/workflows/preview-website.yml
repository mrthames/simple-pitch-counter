name: Preview Website (PR)

on:
  pull_request:
    paths:
      - 'website/**'

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    environment:
      name: pr-preview-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Build preview site
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p _preview
          cp website/index.html website/privacy.html website/contact.html _preview/ 2>/dev/null || true
          # Add a preview banner to the top of the page
          sed -i "s|<body>|<body><div style=\"background:#e8a030;color:#0b1c3a;text-align:center;padding:8px;font-family:sans-serif;font-size:13px;font-weight:600;\">⚠ PR #${PR_NUMBER} Preview — Not production</div>|" _preview/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _preview

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.page_url }}';
            const body = `## 🔍 Preview Deployment\n\n**URL:** ${url}\n\nThis preview will be replaced when the PR is updated and removed when the PR is closed.\n\n---\n*Deployed by GitHub Actions*`;

            // Check for existing preview comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes('Preview Deployment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
