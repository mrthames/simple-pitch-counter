name: Feature Request
description: Suggest a new feature or enhancement
labels: ["type: feature", "status: needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - iOS App
        - Website (simplepitchcounter.com)
        - Both
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this solve, or what opportunity does it create? Who is affected?
      placeholder: "As a coach, I need to... because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Be as specific or as high-level as you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you think about? Why is the proposed solution better?

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      description: How many users or games would this affect?
      options:
        - High — most users, every game
        - Medium — some users or some games
        - Low — niche use case

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, links to similar features in other apps, etc.
