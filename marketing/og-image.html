<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{margin:0;padding:0}
.og{
  width:1200px;height:630px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;
  background:linear-gradient(175deg,#0a1628 0%,#0f2040 35%,#132a52 65%,#0d1d3a 100%);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
}
.glow{
  position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(26,107,255,.12) 0%,transparent 70%);
  top:50%;left:62%;transform:translate(-50%,-50%);pointer-events:none;
}
.glow2{
  position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(52,199,89,.06) 0%,transparent 70%);
  top:20%;left:30%;pointer-events:none;
}
.text-area{
  position:relative;z-index:2;
  padding-left:80px;
  max-width:560px;
}
.icon-row{
  display:flex;align-items:center;gap:14px;
  margin-bottom:18px;
}
.app-icon{
  width:56px;height:56px;
  border-radius:13px;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  flex-shrink:0;
}
.app-icon img{width:100%;height:100%;object-fit:cover}
.app-name{
  font-size:15px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:rgba(255,255,255,.4);
}
.headline{
  font-size:52px;font-weight:900;line-height:1.08;letter-spacing:-0.5px;
  color:#fff;text-transform:uppercase;margin-bottom:18px;
}
.headline .green{color:#34C759}
.headline .blue{color:#1A6BFF}
.sub{font-size:18px;font-weight:400;color:rgba(255,255,255,.45);line-height:1.55}
.badge-row{
  display:flex;gap:8px;margin-top:24px;align-items:center;flex-wrap:wrap;
}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  border-radius:6px;
  padding:6px 12px;
  font-size:12px;font-weight:600;color:rgba(255,255,255,.6);
  letter-spacing:0.5px;
}
.badge .dot{width:6px;height:6px;border-radius:50%}
.dot-green{background:#34C759}
.dot-blue{background:#1A6BFF}
.dot-amber{background:#FF9500}
.phones{
  position:absolute;right:80px;top:50%;transform:translateY(-50%);
  display:flex;gap:0;z-index:1;
}
.phone{
  width:175px;height:370px;
  background:#1a1a1a;
  border-radius:24px;
  padding:5px;
  box-shadow:0 0 0 1px rgba(255,255,255,.06),0 15px 50px rgba(0,0,0,.5);
  flex-shrink:0;
  position:relative;
}
.phone-screen{
  width:100%;height:100%;
  border-radius:20px;overflow:hidden;
  background:#D0D0D0;
}
.phone-screen img{
  width:100%;height:100%;object-fit:cover;object-position:top;
}
.phone.back{
  transform:rotate(5deg);
  z-index:1;margin-right:-15px;
}
.phone.front{
  transform:rotate(-3deg) translateY(30px);
  z-index:2;margin-left:-15px;
}
</style>
</head>
<body>
<div class="og">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="text-area">
    <div class="icon-row">
      <div class="app-icon"><img src="../app/Assets.xcassets/AppIcon.appiconset/icon_1024x1024.png" alt="App icon"></div>
      <div class="app-name">Simple Pitch Counter</div>
    </div>
    <div class="headline">Track <span class="green">every</span> pitch.<br>Know <span class="blue">every</span> rule.</div>
    <div class="sub">Baseball &amp; softball pitch tracking for coaches, parents, and volunteers.</div>
    <div class="badge-row">
      <div class="badge"><span class="dot dot-green"></span>iOS &amp; Android</div>
      <div class="badge"><span class="dot dot-blue"></span>Rest-day rules</div>
      <div class="badge"><span class="dot dot-amber"></span>Free · No ads</div>
    </div>
  </div>
  <div class="phones">
    <div class="phone back">
      <div class="phone-screen">
        <img src="screen-04-advanced.png" alt="Advanced mode">
      </div>
    </div>
    <div class="phone front">
      <div class="phone-screen">
        <img src="screen-02-simple.png" alt="Simple mode">
      </div>
    </div>
  </div>
</div>
</body>
</html>
