<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{margin:0;padding:0}
.og{
  width:1200px;height:630px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;
  background:linear-gradient(175deg,#0a1628 0%,#0f2040 35%,#132a52 65%,#0d1d3a 100%);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
}
.glow{
  position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(52,199,89,.14) 0%,transparent 70%);
  top:50%;left:62%;transform:translate(-50%,-50%);pointer-events:none;
}
.glow2{
  position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(52,199,89,.06) 0%,transparent 70%);
  top:20%;left:30%;pointer-events:none;
}
.text-area{
  position:relative;z-index:2;
  padding-left:80px;
  max-width:600px;
}
.icon-row{
  display:flex;align-items:center;gap:14px;
  margin-bottom:18px;
}
.app-icon{
  width:56px;height:56px;
  border-radius:13px;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  flex-shrink:0;
}
.app-icon img{width:100%;height:100%;object-fit:cover}
.app-name{
  font-size:15px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:rgba(255,255,255,.4);
}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(52,199,89,.15);
  border:1px solid rgba(52,199,89,.3);
  border-radius:6px;
  padding:6px 14px;
  font-size:13px;font-weight:700;color:#34C759;
  letter-spacing:1px;text-transform:uppercase;
  margin-bottom:20px;
}
.eyebrow .dot{width:8px;height:8px;border-radius:50%;background:#34C759}
.headline{
  font-size:50px;font-weight:900;line-height:1.1;letter-spacing:-0.5px;
  color:#fff;text-transform:uppercase;margin-bottom:18px;
}
.headline .green{color:#34C759}
.sub{font-size:18px;font-weight:400;color:rgba(255,255,255,.45);line-height:1.55}
.cta{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:28px;
  background:#34C759;color:#fff;
  padding:12px 28px;border-radius:8px;
  font-size:15px;font-weight:700;letter-spacing:0.5px;
}
.phones{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  display:flex;gap:0;z-index:1;
}
.phone{
  width:175px;height:370px;
  background:#1a1a1a;
  border-radius:24px;
  padding:5px;
  box-shadow:0 0 0 1px rgba(255,255,255,.06),0 15px 50px rgba(0,0,0,.5);
  flex-shrink:0;
  position:relative;
}
.phone-screen{
  width:100%;height:100%;
  border-radius:20px;overflow:hidden;
  background:#D0D0D0;
}
.phone-screen img{
  width:100%;height:100%;object-fit:cover;object-position:top;
}
.phone.back{
  transform:rotate(5deg);
  z-index:1;margin-right:-15px;
}
.phone.front{
  transform:rotate(-3deg) translateY(30px);
  z-index:2;margin-left:-15px;
}
</style>
</head>
<body>
<div class="og">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="text-area">
    <div class="icon-row">
      <div class="app-icon"><img src="../app/Assets.xcassets/AppIcon.appiconset/icon_1024x1024.png" alt="App icon"></div>
      <div class="app-name">Simple Pitch Counter</div>
    </div>
    <div class="eyebrow"><span class="dot"></span> Android Beta</div>
    <div class="headline">Be the first to<br>try it on <span class="green">Android</span></div>
    <div class="sub">Sign up to beta test Simple Pitch Counter on Google Play before it goes live.</div>
    <div class="cta">Join the Beta →</div>
  </div>
  <div class="phones">
    <div class="phone back">
      <div class="phone-screen">
        <img src="finals/02-simple-mode-screen.png" alt="Simple mode">
      </div>
    </div>
    <div class="phone front">
      <div class="phone-screen">
        <img src="finals/01-advanced-mode-screen.png" alt="Advanced mode">
      </div>
    </div>
  </div>
</div>
</body>
</html>
