<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{margin:0;padding:0}
.banner{
  width:1024px;height:500px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;
  background:linear-gradient(175deg,#0a1628 0%,#0f2040 35%,#132a52 65%,#0d1d3a 100%);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
}
.glow{
  position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(26,107,255,.12) 0%,transparent 70%);
  top:50%;left:65%;transform:translate(-50%,-50%);pointer-events:none;
}
.glow2{
  position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(52,199,89,.06) 0%,transparent 70%);
  top:20%;left:30%;pointer-events:none;
}
.text-area{
  position:relative;z-index:2;
  padding-left:70px;
  max-width:480px;
}
.app-name{
  font-size:15px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:rgba(255,255,255,.4);
  margin-bottom:14px;
}
.headline{
  font-size:42px;font-weight:900;line-height:1.08;letter-spacing:-0.5px;
  color:#fff;text-transform:uppercase;margin-bottom:16px;
}
.headline .green{color:#34C759}
.headline .blue{color:#1A6BFF}
.sub{font-size:16px;font-weight:400;color:rgba(255,255,255,.45);line-height:1.5}
.phones{
  position:absolute;right:-20px;top:50%;transform:translateY(-50%);
  display:flex;gap:0;z-index:1;
}
.phone{
  width:155px;height:330px;
  background:#1a1a1a;
  border-radius:22px;
  padding:5px;
  box-shadow:0 0 0 1px rgba(255,255,255,.06),0 15px 50px rgba(0,0,0,.5);
  flex-shrink:0;
  position:relative;
}
.phone-screen{
  width:100%;height:100%;
  border-radius:18px;overflow:hidden;
  background:#D0D0D0;
}
.phone-screen img{
  width:100%;height:100%;object-fit:cover;object-position:top;
}
.phone.back{
  transform:rotate(5deg);
  z-index:1;margin-right:-15px;
}
.phone.front{
  transform:rotate(-3deg) translateY(30px);
  z-index:2;margin-left:-15px;
}
.badge-row{
  display:flex;gap:8px;margin-top:20px;align-items:center;
}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  border-radius:6px;
  padding:5px 10px;
  font-size:11px;font-weight:600;color:rgba(255,255,255,.6);
  letter-spacing:0.5px;
}
.badge .dot{width:6px;height:6px;border-radius:50%}
.dot-green{background:#34C759}
.dot-blue{background:#1A6BFF}
.dot-amber{background:#FF9500}
</style>
</head>
<body>
<div class="banner">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="text-area">
    <div class="app-name">Simple Pitch Counter</div>
    <div class="headline">Track <span class="green">every</span> pitch.<br>Know <span class="blue">every</span> rule.</div>
    <div class="sub">Pitch counts, rest-day thresholds, and game summaries — built for the dugout.</div>
    <div class="badge-row">
      <div class="badge"><span class="dot dot-green"></span>Simple &amp; Advanced modes</div>
      <div class="badge"><span class="dot dot-blue"></span>Rest-day rules</div>
      <div class="badge"><span class="dot dot-amber"></span>Game summaries</div>
    </div>
  </div>
  <div class="phones">
    <div class="phone back">
      <div class="phone-screen">
        <img src="finals/02-simple-mode-screen.png" alt="Simple mode">
      </div>
    </div>
    <div class="phone front">
      <div class="phone-screen">
        <img src="finals/01-advanced-mode-screen.png" alt="Advanced mode">
      </div>
    </div>
  </div>
</div>
</body>
</html>
